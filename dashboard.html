<!DOCTYPE html>
<html lang="zh-CN" data-mode="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Devin 账号面板</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="page">
      <!-- Top rule -->
      <div class="topline">
        <span class="brand-kicker">Devin Account Switcher</span>
        <div class="topline-right">
          <button id="modeToggle" class="icon-btn" title="切换暗 / 亮模式" aria-label="切换主题">
            <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4" />
            </svg>
            <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.5 13.2A8 8 0 1 1 10.8 3.5 6.2 6.2 0 0 0 20.5 13.2Z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Stats -->
      <header class="hero">
        <div class="stats">
          <div class="stat">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-label">账号总数</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="statLoggedIn">0</div>
            <div class="stat-label">已登录</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="statQuota">$0</div>
            <div class="stat-label">额度合计</div>
          </div>
        </div>
      </header>

      <!-- Accounts -->
      <section class="section">
        <div class="section-head">
          <h2 class="section-title"><span class="idx">01</span> 账号</h2>
          <div class="section-tools">
            <div class="search">
              <span>/</span>
              <input id="search" type="text" placeholder="搜索账号 / 组织" />
            </div>
            <button id="btnRefreshAll" class="btn" title="刷新所有账号的状态与额度">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v4h-4"/></svg>
              刷新全部
            </button>
            <button id="btnImport" class="btn btn-primary">导入账号 <span class="arw">→</span></button>
          </div>
        </div>
        <main id="accountGrid" class="account-grid"></main>
        <div id="emptyState" class="empty-state hidden">
          <div class="empty-title">尚无账号</div>
          <div class="empty-sub">点「导入账号」粘贴 <code>邮箱----密码----TOTP</code> 批量导入。</div>
        </div>
      </section>
    </div>

    <!-- Import modal -->
    <div id="importOverlay" class="overlay hidden">
      <div class="modal">
        <div class="modal-head">
          <h3>批量导入账号</h3>
          <button id="importClose" class="icon-btn">✕</button>
        </div>
        <div class="modal-body">
          <div class="seg" role="tablist">
            <button class="seg-btn active" data-mode="github" role="tab">GitHub 登录</button>
            <button class="seg-btn" data-mode="devin" role="tab">Devin 直登</button>
          </div>
          <div class="import-hint" id="importHint">
            GitHub 登录：走 GitHub 账密 + TOTP 授权 Devin。每行一个账号：<br /><code>邮箱----密码----TOTP密钥</code>
          </div>
          <textarea id="importText" rows="7" placeholder="name1@example.com----password1----TOTPSECRET1&#10;name2@example.com----password2----TOTPSECRET2"></textarea>
        </div>
        <div class="modal-actions">
          <button id="importCancel" class="btn">取消</button>
          <button id="importConfirm" class="btn btn-primary">导入</button>
        </div>
      </div>
    </div>

    <!-- Sessions panel -->
    <div id="sessOverlay" class="overlay right hidden">
      <aside class="panel">
        <div class="panel-head">
          <div>
            <div class="panel-title">会话管理</div>
            <div id="sessSub" class="panel-sub"></div>
          </div>
          <div class="panel-head-actions">
            <button id="sessRefresh" class="icon-btn" title="刷新">↻</button>
            <button id="sessClose" class="icon-btn" title="关闭">✕</button>
          </div>
        </div>
        <div class="panel-note">「删除」调用官方 v3 删除接口，真正结束并删除会话（非归档，不可恢复）。</div>
        <div id="sessList" class="sess-list"></div>
      </aside>
    </div>

    <!-- Export dialog -->
    <div id="exportOverlay" class="overlay hidden">
      <div class="modal">
        <div class="modal-head">
          <h3>导出会话</h3>
          <button id="exportClose" class="icon-btn">✕</button>
        </div>
        <div class="modal-body">
          <div id="exportSub" class="export-sub"></div>
          <div class="export-modes">
            <button class="export-mode" data-xmode="chat">
              <span class="xm-title">仅导出会话</span>
              <span class="xm-desc">只导对话历史，输出单个 <code>conversation.md</code>（最快，不下载文件）。</span>
            </button>
            <button class="export-mode" data-xmode="full">
              <span class="xm-title">全量导出</span>
              <span class="xm-desc">对话 + 所有文件改动 + diff，打包成 <code>.zip</code>。</span>
            </button>
          </div>
          <div class="export-opts">
            <label><input type="checkbox" id="optRedact" checked /> 脱敏敏感信息（token / 密钥，推荐）</label>
            <label><input type="checkbox" id="optThoughts" /> 包含 Devin 内心独白</label>
            <label><input type="checkbox" id="optShell" /> 包含 shell 命令计数</label>
          </div>
          <div id="exportStatus" class="export-status hidden"></div>
        </div>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>

    <script type="module" src="dashboard.js"></script>
  </body>
</html>
